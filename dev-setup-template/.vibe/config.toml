# Mistral Vibe – Projekt-Konfiguration

active_model = "devstral-2"
agent_paths = [".vibe/agents"]

[tool_permissions]
read_file = "always"
grep = "always"
list_dir = "always"
write_file = "ask"
patch_file = "ask"
bash = "ask"

# MCP Server — context7 als Default
# Weitere bei Bedarf ergaenzen (siehe .mcp.json fuer Claude-Format)

[[mcp_servers]]
name = "context7"
transport = "stdio"
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]
